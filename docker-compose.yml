services:
  app:
    build: .
    container_name: mafia-club
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-mafia-club-super-secret-change-me-in-production}
    restart: unless-stopped
